services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

volumes:
  uploads:
